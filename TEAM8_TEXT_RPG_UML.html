<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>TEAM8 RPG — UML Class Diagram</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght=300;400;600;700&display=swap');

:root {
  --bg:      #0b0e14;
  --bg2:     #131820;
  --bg3:     #1a2030;
  --border:  #252d3d;
  --border2: #2e3a50;
  --text:    #cdd9e5;
  --text2:   #768390;
  --text3:   #4a5568;
  --purple:  #c792ea;
  --blue:    #82aaff;
  --cyan:    #89ddff;
  --teal:    #21c08b;
  --coral:   #f07178;
  --amber:   #ffcb6b;
  --green:   #c3e88d;
  --pink:    #f78c6c;
  --gray:    #546178;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  background: var(--bg);
  font-family: 'JetBrains Mono', monospace;
  color: var(--text);
  display: flex;
  flex-direction: column;
}

/* ── 탭 헤더 ── */
.tab-header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: flex-end;
  gap: 0;
  position: sticky;
  top: 0;
  z-index: 200;
  flex-wrap: wrap;
}
.tab-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .15em;
  color: var(--text2);
  padding: 14px 20px 12px;
  margin-right: 20px;
  border-right: 1px solid var(--border);
}
.tab-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  padding: 12px 18px 10px;
  cursor: pointer;
  transition: color .15s, border-color .15s;
  letter-spacing: .05em;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--text2); }
.tab-btn.active { color: var(--text); border-bottom-color: var(--blue); }

.legend {
  margin-left: auto;
  display: flex;
  gap: 16px;
  align-items: center;
  padding: 8px 0;
  flex-wrap: wrap;
}
.leg { display:flex; align-items:center; gap:5px; font-size:10px; color: var(--text3); }
.leg-line { width:22px; height:2px; }
.leg-line.inherit { background: var(--purple); }
.leg-line.compose { background: var(--blue); }
.leg-line.dep     { background: repeating-linear-gradient(90deg,var(--amber) 0 4px,transparent 4px 8px); }
.leg-line.use     { background: repeating-linear-gradient(90deg,var(--teal) 0 3px,transparent 3px 7px); }

/* ── 탭 패널 ── */
.tab-panel { display:none; flex:1; overflow:auto; padding:36px 32px 60px; }
.tab-panel.active { display:block; }

/* ── SVG 공통 ── */
svg { display:block; }

/* ── UML 텍스트 스타일 ── */
.t-pkg    { font-size:10px; fill:var(--text3); letter-spacing:.1em; font-family:'JetBrains Mono',monospace; }
.t-stereo { font-size:9px;  fill:var(--text3); font-style:italic; font-family:'JetBrains Mono',monospace; }
.t-name   { font-weight:700; font-family:'JetBrains Mono',monospace; }
.t-file   { font-size:9px;  fill:var(--text3); font-family:'JetBrains Mono',monospace; }
.t-vis    { font-size:10px; fill:var(--text3); font-family:'JetBrains Mono',monospace; }
.t-f      { font-size:10px; fill:var(--text2); font-family:'JetBrains Mono',monospace; }
.t-m      { font-size:10px; fill:var(--cyan);  font-family:'JetBrains Mono',monospace; }
.t-type   { fill:var(--amber); }
.t-note   { font-size:9px;  fill:var(--coral); font-style:italic; font-family:'JetBrains Mono',monospace; }
.t-enum   { font-size:10px; fill:var(--green); font-family:'JetBrains Mono',monospace; }
.t-sm     { font-size:9px;  fill:var(--teal);  font-family:'JetBrains Mono',monospace; }
.div-l    { stroke:var(--border2); stroke-width:1; }

/* 관계선 */
.r-inherit { fill:none; stroke:var(--purple); stroke-width:1.5; }
.r-compose { fill:none; stroke:var(--blue);   stroke-width:1.5; }
.r-dep     { fill:none; stroke:var(--amber);  stroke-width:1.2; stroke-dasharray:5 3; }
.r-use     { fill:none; stroke:var(--teal);   stroke-width:1.2; stroke-dasharray:3 3; }
.r-assoc   { fill:none; stroke:var(--text3);  stroke-width:1.2; }
.r-lbl     { font-size:9px; fill:var(--text3); font-family:'JetBrains Mono',monospace; }
</style>
</head>
<body>

<div class="tab-header">
  <div class="tab-title">TEAM8 RPG · UML</div>
  <button class="tab-btn active" onclick="switchTab(0)">① Game · UI · Sound</button>
  <button class="tab-btn"        onclick="switchTab(1)">② Character · Item</button>
  <button class="tab-btn"        onclick="switchTab(2)">③ Monster · Shop · Enums</button>
  <div class="legend">
    <div class="leg"><div class="leg-line inherit"></div><span style="color:var(--purple)">▷ 상속</span></div>
    <div class="leg"><div class="leg-line compose"></div><span style="color:var(--blue)">◆ 컴포지션</span></div>
    <div class="leg"><div class="leg-line delete"></div><span style="color:var(--amber)">- - 의존</span></div>
    <div class="leg"><div class="leg-line use"></div><span style="color:var(--teal)">··· 사용</span></div>
  </div>
</div>
